<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --primary: #c8401a; /* Your bank accent color */
            --border: #e2e8f0;
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #ef4444;
            --border: #334155;
            --input-bg: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.2s ease; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Top Bar for Controls */
        .controls {
            position: fixed;
            top: 2rem;
            right: 2rem;
            display: flex;
            gap: 1rem;
        }

        .icon-btn {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 0.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            color: var(--text);
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .lang-select {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem;
            border-radius: 0.75rem;
            outline: none;
            font-weight: 500;
        }

        /* Login Card */
        .login-card {
            background: var(--card);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .logo {
            width: 48px; height: 48px; background: var(--primary);
            border-radius: 12px; margin: 0 auto 1rem;
            display: flex; align-items: center; justify-content: center; color: white;
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { color: var(--text-muted); font-size: 0.875rem; }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem; color: var(--text-muted); }

        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text);
            outline: none;
        }

        input:focus { border-color: var(--primary); ring: 2px var(--primary); }

        button.submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        button.submit:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="controls">
    <select class="lang-select" id="langSelect" onchange="changeLang(this.value)">
        <option value="uz">O'zbek</option>
        <option value="en">English</option>
        <option value="ru">Русский</option>
    </select>
    <button class="icon-btn" onclick="toggleTheme()">
        <i data-lucide="sun" id="themeIcon"></i>
    </button>
</div>

<div class="login-card">
    <div class="header">
        <div class="logo"><i data-lucide="shield-check"></i></div>
        <h1 id="title">Admin Login</h1>
        <p id="subtitle">Please enter your credentials to continue</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label id="lblUser">Username</label>
            <div class="input-wrapper">
                <i data-lucide="user" size="18"></i>
                <input type="text" id="username" placeholder="admin_tenge" required>
            </div>
        </div>

        <div class="form-group">
            <label id="lblPass">Password</label>
            <div class="input-wrapper">
                <i data-lucide="lock" size="18"></i>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="submit" id="btnSubmit">Login to Dashboard</button>
    </form>
</div>

<script>
    // Initialize Icons
    lucide.createIcons();

    // Multi-language Data
    const i18n = {
        uz: {
            title: "Admin Tizimi",
            subtitle: "Davom etish uchun ma'lumotlarni kiriting",
            lblUser: "Foydalanuvchi nomi",
            lblPass: "Parol",
            btnSubmit: "Tizimga kirish"
        },
        en: {
            title: "Admin Portal",
            subtitle: "Please enter your credentials to continue",
            lblUser: "Username",
            lblPass: "Password",
            btnSubmit: "Login to Dashboard"
        },
        ru: {
            title: "Админ Панель",
            subtitle: "Введите данные для входа",
            lblUser: "Имя пользователя",
            lblPass: "Пароль",
            btnSubmit: "Войти в систему"
        }
    };

    function changeLang(lang) {
        document.getElementById('title').innerText = i18n[lang].title;
        document.getElementById('subtitle').innerText = i18n[lang].subtitle;
        document.getElementById('lblUser').innerText = i18n[lang].lblUser;
        document.getElementById('lblPass').innerText = i18n[lang].lblPass;
        document.getElementById('btnSubmit').innerText = i18n[lang].btnSubmit;
    }

    // Theme Toggle
    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('themeIcon');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            icon.setAttribute('data-lucide', 'sun');
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.setAttribute('data-lucide', 'moon');
        }
        lucide.createIcons(); // Refresh icons
    }

    // Form Submission
<!--    document.getElementById('loginForm').onsubmit = async (e) => {-->

<!--        const btn = document.getElementById('btnSubmit');-->
<!--        btn.disabled = true;-->
<!--        btn.innerText = "...";-->

<!--        const payload = {-->
<!--            username: document.getElementById('username').value,-->
<!--            password: document.getElementById('password').value-->
<!--        };-->

<!--        try {-->
<!--            const response = await fetch('/api/admin/login', {-->
<!--                method: 'POST',-->
<!--                headers: { 'Content-Type': 'application/json' },-->
<!--                body: JSON.stringify(payload)-->
<!--            });-->

<!--            if (response.ok) {-->
<!--                window.location.href = '/form/admin/dashboard';-->
<!--            } else {-->
<!--                alert('Login Failed');-->
<!--            }-->
<!--        } catch (err) {-->
<!--            console.error(err);-->
<!--        } finally {-->
<!--            btn.disabled = false;-->
<!--            changeLang(document.getElementById('langSelect').value);-->
<!--        }-->
<!--    };-->
    document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    const lang = document.getElementById('langSelect').value;

    btn.disabled = true;
    btn.innerText = "...";

    const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };

    try {
        const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            // CRITICAL FIX: Get the token text from the response body
            const token = await response.text();

            // CRITICAL FIX: Save it so the dashboard can read it
            // We use btoa() just to mask it in localStorage as requested
            localStorage.setItem('admin_token', btoa(token));

            // Now redirect
            window.location.href = '/form/admin/dashboard';
        } else {
            const errorMsg = {
                uz: "Login yoki parol noto'g'ri",
                en: "Invalid username or password",
                ru: "Неверный логин или пароль"
            };
            alert(errorMsg[lang]);
        }
    } catch (err) {
        console.error("Connection error:", err);
        alert("Server error. Please try again later.");
    } finally {
        btn.disabled = false;
        changeLang(lang);
    }
};
</script>
</body>
</html>
